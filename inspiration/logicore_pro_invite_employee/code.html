<style>
        body {
            background-color: #0b1326; /* surface */
            color: #dae2fd; /* on-surface */

            backdrop-filter: blur(8px);
        }

        /* Custom Scrollbar for dropdowns if needed */

            width: 8px;

<body class="min-h-screen flex items-center justify-center p-md bg-surface font-body-md text-on-surface">
<!-- Modal Overlay Backdrop -->
<div aria-hidden="true" class="fixed inset-0 bg-surface-container-lowest/80 modal-backdrop z-40"></div>
<!-- Invite Employee Modal Container (Level 3 Elevation) -->
<div class="relative z-50 w-full max-w-lg bg-surface-container-low rounded-xl shadow-2xl border border-outline-variant overflow-hidden flex flex-col">
<!-- Header -->
<div class="px-lg py-md border-b border-surface-container-highest flex items-center justify-between">
<div>
<h2 class="font-h3 text-h3 text-on-surface">Invite Employee</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Grant access to Nexus ERP terminals.</p>
</div>
<button class="text-on-surface-variant hover:text-on-surface hover:bg-surface-container p-sm rounded-full transition-colors flex items-center justify-center group focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Form Body -->
<div class="p-lg flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-xs" for="email">
<span class="material-symbols-outlined text-[16px]">mail</span>
                    Employee Email
                </label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow" id="email" placeholder="name@company.com" type="email"/>
</div>
<!-- Horizontal Group: Role & Warehouse -->
<div class="flex flex-col md:flex-row gap-md">
<!-- Role Dropdown -->
<div class="flex flex-col gap-xs flex-1">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-xs" for="role">
<span class="material-symbols-outlined text-[16px]">badge</span>
                        Role
                    </label>
<div class="relative">
<select class="w-full bg-surface border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md text-on-surface appearance-none focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow cursor-pointer" id="role">
<option disabled="" hidden="" selected="" value="">Select Role</option>
<option value="admin">Administrator</option>
<option value="manager">Warehouse Manager</option>
<option value="picker">Inventory Picker</option>
<option value="auditor">Auditor</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant text-[20px]">expand_more</span>
</div>
</div>
<!-- Warehouse Dropdown -->
<div class="flex flex-col gap-xs flex-1">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-xs" for="warehouse">
<span class="material-symbols-outlined text-[16px]">warehouse</span>
                        Assigned Warehouse
                    </label>
<div class="relative">
<select class="w-full bg-surface border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md text-on-surface appearance-none focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow cursor-pointer" id="warehouse">
<option disabled="" hidden="" selected="" value="">Select Location</option>
<option value="all">Global (All Locations)</option>
<option value="w1">Terminal Alpha - NA</option>
<option value="w2">Terminal Beta - EU</option>
<option value="w3">Terminal Gamma - APAC</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant text-[20px]">expand_more</span>
</div>
</div>
</div>
<!-- Optional Message -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-xs" for="message">
<span class="material-symbols-outlined text-[16px]">chat</span>
                    Optional Message
                </label>
<textarea class="w-full bg-surface border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow resize-none" id="message" placeholder="Welcome to the team..." rows="3"></textarea>
</div>
</div>
<!-- Footer Actions -->
<div class="px-lg py-md bg-surface-container-lowest border-t border-surface-container-highest flex items-center justify-end gap-sm">
<button class="px-md py-[10px] rounded-lg font-label-md text-label-md text-on-surface-variant bg-transparent border border-outline-variant hover:bg-surface-container-highest hover:text-on-surface transition-all focus:outline-none focus:ring-2 focus:ring-outline">
                Cancel
            </button>
<button class="px-md py-[10px] rounded-lg font-label-md text-label-md text-on-primary-container bg-primary-container hover:bg-inverse-primary hover:shadow-lg transition-all flex items-center gap-xs focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface">
<span class="material-symbols-outlined text-[18px]">send</span>
                Send Invitation
            </button>
</div>
</div>
</body></html>
